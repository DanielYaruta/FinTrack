# ============================================================
# Базовый конфиг — применяется всегда, независимо от профиля.
# Настройки из application-dev.properties или application-prod.properties
# добавляются поверх (или переопределяют) эти значения.
# ============================================================

spring.application.name=FinTrack

# Активный профиль. Переключи на prod перед деплоем.
spring.profiles.active=dev

# Порт сервера
server.port=8080

# Thymeleaf: отключить кеш шаблонов (удобно при разработке — шаблон
# перечитывается при каждом запросе без перезапуска приложения)
spring.thymeleaf.cache=false

# Логировать только то, что важно — детали в профилях
logging.level.root=WARN
logging.level.com.fintrack=INFO
