# ============================================================
# Профиль DEV — локальная разработка
# ============================================================

# --- База данных ---
# Замени username/password на свои учётные данные PostgreSQL.
# Создай базу вручную: CREATE DATABASE fintrack_dev;
spring.datasource.url=jdbc:postgresql://localhost:5432/fintrack_dev
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# validate — Hibernate только проверяет схему, но НЕ изменяет её.
# Схемой управляет Flyway (миграции в src/main/resources/db/migration/).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Flyway ---
# Flyway автоматически найдёт файлы db/migration/V*.sql и выполнит их по порядку.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Логирование (подробнее, чем в prod) ---
logging.level.com.fintrack=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
