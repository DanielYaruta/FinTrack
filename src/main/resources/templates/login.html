<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход — FinTrack</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #f8f9fa; }
        .login-card { max-width: 420px; margin: 80px auto; }
    </style>
</head>

<body>
<div class="login-card card p-4 shadow-sm">

    <div class="text-center mb-4">
        <i class="bi bi-wallet2 fs-1 text-primary"></i>
        <h4 class="mt-2 fw-bold">FinTrack</h4>
        <p class="text-muted small">Личные финансы под контролем</p>
    </div>

    <!--
      th:action="@{/login}" — POST /login обрабатывает Spring Security.
      Thymeleaf автоматически добавляет скрытое поле _csrf с токеном.

      Spring Security ожидает параметры с именами "username" и "password".
      Мы используем email в качестве username.
    -->
    <form th:action="@{/login}" method="post">

        <!-- Сообщение об ошибке — Spring Security добавляет ?error при неверном входе -->
        <div th:if="${param.error}"
             class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-circle me-1"></i>
            Неверный email или пароль
        </div>

        <!-- Сообщение о выходе — при ?logout -->
        <div th:if="${param.logout}"
             class="alert alert-success py-2 small">
            <i class="bi bi-check-circle me-1"></i>
            Вы вышли из системы
        </div>

        <div class="mb-3">
            <label for="username" class="form-label">Email</label>
            <input type="email" class="form-control" id="username"
                   name="username" placeholder="demo@fintrack.com"
                   autocomplete="email" required autofocus>
        </div>

        <div class="mb-4">
            <label for="password" class="form-label">Пароль</label>
            <input type="password" class="form-control" id="password"
                   name="password" placeholder="••••••"
                   autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>Войти
        </button>

        <p class="text-center text-muted small mt-3 mb-0">
            Demo: <code>demo@fintrack.com</code> / <code>demo</code>
        </p>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
