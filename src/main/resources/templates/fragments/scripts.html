<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  Общий фрагмент скриптов: Bootstrap JS + глобальный notifications.js.
  Включается в самом низу <body> каждого шаблона вместо повторяющегося <script>.
  Страничные скрипты (dashboard.js, transactions.js) добавляются ПОСЛЕ этого фрагмента.
-->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/notifications.js"></script>
</div>
</body>
</html>
