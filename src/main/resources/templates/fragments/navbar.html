<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- Toast-контейнер: фиксирован в правом нижнем углу, z-index поверх всего -->
<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"
     style="z-index: 9999" th:fragment="toasts"></div>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
            <i class="bi bi-wallet2 me-1"></i>FinTrack
        </a>

        <!-- Кнопка-гамбургер для мобильных (работает через Bootstrap JS) -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">

                <!--
                  th:classappend — добавляет класс "active" к текущему пункту меню.
                  #httpServletRequest.requestURI.startsWith('/dashboard') — проверяем
                  текущий URL через встроенный объект Thymeleaf.
                -->
                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/dashboard}"
                       th:classappend="${currentUri != null and currentUri.startsWith('/dashboard')} ? 'active'">
                        <i class="bi bi-speedometer2 me-1"></i>Дашборд
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/transactions}"
                       th:classappend="${currentUri != null and currentUri.startsWith('/transactions')} ? 'active'">
                        <i class="bi bi-arrow-left-right me-1"></i>Транзакции
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/categories}"
                       th:classappend="${currentUri != null and currentUri.startsWith('/categories')} ? 'active'">
                        <i class="bi bi-tags me-1"></i>Категории
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/reports}"
                       th:classappend="${currentUri != null and currentUri.startsWith('/reports')} ? 'active'">
                        <i class="bi bi-file-earmark-bar-graph me-1"></i>Отчёты
                    </a>
                </li>
            </ul>

            <!-- Правая часть: email пользователя + кнопка выхода -->
            <div class="d-flex align-items-center gap-2">
                <a class="nav-link text-light"
                   th:href="@{/profile}"
                   th:classappend="${currentUri != null and currentUri.startsWith('/profile')} ? 'active'">
                    <i class="bi bi-person-circle me-1"></i>
                    <span th:text="${currentUserEmail}">user@example.com</span>
                </a>

                <!--
                  Выход: POST /logout — Spring Security обрабатывает его сам.
                  Thymeleaf добавит скрытый CSRF-токен автоматически через th:action.
                -->
                <form th:action="@{/logout}" method="post" class="mb-0">
                    <button type="submit" class="btn btn-sm btn-outline-light">
                        <i class="bi bi-box-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

</body>
</html>
