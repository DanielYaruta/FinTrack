<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
  th:fragment="head(title)" — объявляем фрагмент с параметром.
  Другие шаблоны вставят его так:
    <head th:replace="~{fragments/head :: head('Транзакции')}">
-->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | FinTrack'">FinTrack</title>

    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
        .metric-card .metric-value { font-size: 1.8rem; font-weight: 700; }
        .badge-income  { background-color: #198754; }
        .badge-expense { background-color: #dc3545; }
        .amount-income  { color: #198754; font-weight: 600; }
        .amount-expense { color: #dc3545; font-weight: 600; }
    </style>
</head>
</html>
