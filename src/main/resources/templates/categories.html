<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Категории')}"></head>

<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div th:replace="~{fragments/navbar :: toasts}"></div>

<main class="container mt-4 mb-5">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-1"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">

        <!-- Форма добавления -->
        <div class="col-lg-4">
            <div class="card p-4">
                <h5 class="card-title mb-3"><i class="bi bi-tag me-1"></i>Новая категория</h5>
                <form th:action="@{/categories}" method="post" th:object="${categoryDto}">

                    <div class="mb-3">
                        <label for="name" class="form-label">Название</label>
                        <input type="text" class="form-control" id="name"
                               th:field="*{name}"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                               placeholder="Например: Зарплата">
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="type" class="form-label">Тип</label>
                        <select class="form-select" id="type"
                                th:field="*{type}"
                                th:classappend="${#fields.hasErrors('type')} ? 'is-invalid'">
                            <option value="">— выберите —</option>
                            <option value="INCOME">Доход</option>
                            <option value="EXPENSE">Расход</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{type}"></div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-plus-lg me-1"></i>Добавить
                    </button>
                </form>
            </div>
        </div>

        <!-- Список категорий -->
        <div class="col-lg-8">
            <div class="row g-3">
                <!-- Доходы -->
                <div class="col-md-6">
                    <div class="card p-3">
                        <h6 class="text-success mb-3"><i class="bi bi-arrow-up-circle me-1"></i>Доходы</h6>
                        <ul class="list-group list-group-flush">
                            <li th:each="cat : ${categories}"
                                th:if="${cat.type.name() == 'INCOME'}"
                                class="list-group-item d-flex justify-content-between align-items-center px-0">
                                <span th:text="${cat.name}"></span>
                                <form th:action="@{/categories/{id}/delete(id=${cat.id})}"
                                      method="post"
                                      onsubmit="return confirm('Удалить категорию?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger py-0">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>
                <!-- Расходы -->
                <div class="col-md-6">
                    <div class="card p-3">
                        <h6 class="text-danger mb-3"><i class="bi bi-arrow-down-circle me-1"></i>Расходы</h6>
                        <ul class="list-group list-group-flush">
                            <li th:each="cat : ${categories}"
                                th:if="${cat.type.name() == 'EXPENSE'}"
                                class="list-group-item d-flex justify-content-between align-items-center px-0">
                                <span th:text="${cat.name}"></span>
                                <form th:action="@{/categories/{id}/delete(id=${cat.id})}"
                                      method="post"
                                      onsubmit="return confirm('Удалить категорию?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger py-0">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
