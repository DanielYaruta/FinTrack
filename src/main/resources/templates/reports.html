<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Отчёты')}"></head>

<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div th:replace="~{fragments/navbar :: toasts}"></div>

<main class="container mt-4 mb-5">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-1"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">

        <!-- Генерация отчётов -->
        <div class="col-lg-4">
            <div class="card p-4">
                <h5 class="card-title mb-3"><i class="bi bi-file-earmark-plus me-1"></i>Создать отчёт</h5>
                <!-- Предпросмотр и экспорт -->
                <form th:action="@{/reports/preview}" method="get" class="mb-3">
                    <div class="mb-2">
                        <label class="form-label small mb-1">С</label>
                        <input type="date" name="from" class="form-control form-control-sm" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small mb-1">По</label>
                        <input type="date" name="to" class="form-control form-control-sm" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-eye me-1"></i>Предпросмотр и экспорт
                    </button>
                </form>

                <hr class="my-3">
                <p class="text-muted small mb-2">Быстрое создание за текущий период:</p>

                <form th:action="@{/reports/monthly}" method="post" class="mb-2">
                    <button type="submit" class="btn btn-outline-primary w-100 btn-sm">
                        <i class="bi bi-calendar-month me-1"></i>Месячный отчёт
                    </button>
                </form>

                <form th:action="@{/reports/quarterly}" method="post">
                    <button type="submit" class="btn btn-outline-secondary w-100 btn-sm">
                        <i class="bi bi-calendar3 me-1"></i>Квартальный отчёт
                    </button>
                </form>
            </div>
        </div>

        <!-- История отчётов -->
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header bg-white py-3">
                    <h6 class="mb-0"><i class="bi bi-clock-history me-1"></i>История отчётов</h6>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Период</th>
                            <th>Тип</th>
                            <th>Создан</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="r : ${reports}">
                            <td th:text="${r.period}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${r.type.name() == 'MONTHLY'} ? 'bg-primary' : 'bg-secondary'"
                                      th:text="${r.type.name() == 'MONTHLY'} ? 'Месячный' : 'Квартальный'">
                                </span>
                            </td>
                            <td class="text-muted small"
                                th:text="${#temporals.format(r.generatedAt, 'dd.MM.yyyy HH:mm')}">
                            </td>
                            <td class="text-end text-nowrap">
                                <a th:href="@{/reports/{id}/download(id=${r.id},format='pdf')}"
                                   class="btn btn-sm btn-outline-danger me-1"
                                   title="Скачать PDF">
                                    <i class="bi bi-file-earmark-pdf"></i>
                                </a>
                                <a th:href="@{/reports/{id}/download(id=${r.id},format='excel')}"
                                   class="btn btn-sm btn-outline-success me-1"
                                   title="Скачать Excel">
                                    <i class="bi bi-file-earmark-excel"></i>
                                </a>
                                <form th:action="@{/reports/{id}/delete(id=${r.id})}"
                                      method="post" class="d-inline"
                                      onsubmit="return confirm('Удалить запись?')">
                                    <button class="btn btn-sm btn-outline-secondary">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(reports)}">
                            <td colspan="4" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-4 d-block mb-2"></i>
                                Отчётов ещё нет
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</main>

<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
