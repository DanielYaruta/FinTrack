<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Отчёты')}"></head>

<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container mt-4 mb-5">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-1"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">

        <!-- Генерация отчётов -->
        <div class="col-lg-4">
            <div class="card p-4">
                <h5 class="card-title mb-3"><i class="bi bi-file-earmark-plus me-1"></i>Создать отчёт</h5>
                <p class="text-muted small">Отчёт создаётся за текущий период. Скачать PDF/Excel можно будет в следующем этапе.</p>

                <form th:action="@{/reports/monthly}" method="post" class="mb-2">
                    <button type="submit" class="btn btn-outline-primary w-100">
                        <i class="bi bi-calendar-month me-1"></i>Месячный отчёт
                        <span class="text-muted small" th:text="'(' + ${#temporals.format(#temporals.createNow(), 'LLLL yyyy', #locale)} + ')'"></span>
                    </button>
                </form>

                <form th:action="@{/reports/quarterly}" method="post">
                    <button type="submit" class="btn btn-outline-secondary w-100">
                        <i class="bi bi-calendar3 me-1"></i>Квартальный отчёт
                    </button>
                </form>
            </div>
        </div>

        <!-- История отчётов -->
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header bg-white py-3">
                    <h6 class="mb-0"><i class="bi bi-clock-history me-1"></i>История отчётов</h6>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Период</th>
                            <th>Тип</th>
                            <th>Создан</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="r : ${reports}">
                            <td th:text="${r.period}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${r.type.name() == 'MONTHLY'} ? 'bg-primary' : 'bg-secondary'"
                                      th:text="${r.type.name() == 'MONTHLY'} ? 'Месячный' : 'Квартальный'">
                                </span>
                            </td>
                            <td class="text-muted small"
                                th:text="${#temporals.format(r.generatedAt, 'dd.MM.yyyy HH:mm')}">
                            </td>
                            <td class="text-end">
                                <!-- Stage 4: здесь будет кнопка Download PDF/Excel -->
                                <form th:action="@{/reports/{id}/delete(id=${r.id})}"
                                      method="post"
                                      onsubmit="return confirm('Удалить запись?')">
                                    <button class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(reports)}">
                            <td colspan="4" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-4 d-block mb-2"></i>
                                Отчётов ещё нет
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
